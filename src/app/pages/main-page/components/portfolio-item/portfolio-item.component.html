<div (click)="open(content)" class="portfolio-item">
  <img [alt]="project.name" [src]="imagePath">
  <div class="portfolio-item-inner">
    <div class="portfolio-item-animation">
      <div class="portfolio-item-animation-text">
        <span>{{'mainPage.projects.knowMore' | translate}}</span>
      </div>
    </div>
    <div class="portfolio-item-title">
      <h2>{{project.name}}</h2>
    </div>
  </div>
</div>
<ng-template #content let-modal>
  <div class="modal-header">
    <h4 class="modal-title" id="modal-basic-title">{{project.name}}</h4>
    <button (click)="modal.dismiss()" aria-label="Close" class="close" type="button">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  <div [innerHTML]="project.html | trustHtml" class="modal-body">
  </div>
  <div class="modal-footer">
    <button (click)="modal.dismiss()" aria-label="Close" class="btn btn-light"
            type="button">{{'mainPage.projects.close' | translate}}</button>
  </div>
</ng-template>
